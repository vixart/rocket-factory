syntax = "proto3";

package payment.v1;

option go_package = "github.com/vixart/rocket-factory/shared/pkg/proto/payment/v1;paymentv1";

// PaymentService обрабатывает оплату заказов
service PaymentService {
  // PayOrder обрабатывает оплату заказа
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// Способ оплаты
enum PaymentMethod {
  UNSPECIFIED = 0;
  CARD = 1;
  SBP = 2;
  CREDIT_CARD = 3;
  INVESTOR_MONEY = 4;
}

// Запрос на оплату заказа
message PayOrderRequest {
  // UUID заказа
  string order_uuid = 1;

  // Выбранный способ оплаты (обязательный)
  PaymentMethod payment_method = 2;
}
// Ответ на оплату заказа
message PayOrderResponse {
  // UUID заказа
  string transaction_uuid = 1;
}
